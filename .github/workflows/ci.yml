name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    env:
      BUILD_DIR: build/ci
      CTEST_OUTPUT_ON_FAILURE: 1
      TEST_EXEC_TIMEOUT_SEC: 1800

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            ninja-build \
            pkg-config \
            libasound2-dev \
            libpulse-dev \
            libaudio-dev \
            libfribidi-dev \
            libjack-dev \
            libsndio-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libxtst-dev \
            libxkbcommon-dev \
            libdrm-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev \
            libdbus-1-dev \
            libibus-1.0-dev \
            libudev-dev \
            libthai-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libdecor-0-dev \
            liburing-dev
        shell: bash

      - name: Resolve macOS SDK path
        if: runner.os == 'macOS'
        id: macos-sdk
        run: |
          sdk_path="$(xcrun --sdk macosx --show-sdk-path)"
          printf 'sdk_path=%s\n' "$sdk_path" >> "$GITHUB_OUTPUT"

      - name: Configure
        run: >-
          cmake -S . -B "${{ env.BUILD_DIR }}"
          -G Ninja
          ${{ runner.os == 'Linux' && '-D CMAKE_C_COMPILER=clang -D CMAKE_CXX_COMPILER=clang++' || '' }}
          ${{ runner.os == 'macOS' && format('-D CMAKE_C_COMPILER=/usr/bin/clang -D CMAKE_CXX_COMPILER=/usr/bin/clang++ -D CMAKE_OBJC_COMPILER=/usr/bin/clang -D CMAKE_OBJCXX_COMPILER=/usr/bin/clang++ -D CMAKE_OSX_SYSROOT={0} -D CMAKE_OSX_DEPLOYMENT_TARGET=11.0', steps.macos-sdk.outputs.sdk_path) || '' }}
          ${{ runner.os == 'Windows' && '-D CMAKE_C_COMPILER=clang-cl -D CMAKE_CXX_COMPILER=clang-cl' || '' }}
          -D CMAKE_BUILD_TYPE=Release
          -D BASED_BUILD_TESTS=ON
          -D BASED_ENABLE_MODULE_GRAPHICS=ON

      - name: Build
        run: cmake --build "${{ env.BUILD_DIR }}" --parallel

      - name: Run test executables
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: >-
          python .github/scripts/run_test_executables.py
          --build-dir "${{ env.BUILD_DIR }}"
          --build-config Release
          --timeout-sec "${{ env.TEST_EXEC_TIMEOUT_SEC }}"
