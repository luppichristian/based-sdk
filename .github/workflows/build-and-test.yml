name: Build And Test

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.arch }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-13
          - macos-latest
          - windows-latest
        arch:
          - x86_64
          - arm64
        build_type:
          - Debug
          - Release
        include:
          - os: ubuntu-latest
            arch: x86_64
            build_type: RelWithDebInfo
          - os: ubuntu-latest
            arch: x86_64
            build_type: MinSizeRel
          - os: ubuntu-24.04-arm
            arch: arm64
            build_type: RelWithDebInfo
          - os: ubuntu-24.04-arm
            arch: arm64
            build_type: MinSizeRel
          - os: macos-13
            arch: x86_64
            build_type: RelWithDebInfo
          - os: macos-13
            arch: x86_64
            build_type: MinSizeRel
          - os: macos-latest
            arch: arm64
            build_type: RelWithDebInfo
          - os: macos-latest
            arch: arm64
            build_type: MinSizeRel
          - os: windows-latest
            arch: x86_64
            build_type: RelWithDebInfo
          - os: windows-latest
            arch: x86_64
            build_type: MinSizeRel
        exclude:
          - os: ubuntu-latest
            arch: arm64
          - os: ubuntu-24.04-arm
            arch: x86_64
          - os: macos-13
            arch: arm64
          - os: macos-latest
            arch: x86_64
          - os: windows-latest
            arch: arm64

    env:
      BUILD_DIR: build/ci
      CTEST_OUTPUT_ON_FAILURE: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            ninja-build \
            pkg-config \
            libasound2-dev \
            libpulse-dev \
            libaudio-dev \
            libfribidi-dev \
            libjack-dev \
            libsndio-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libxtst-dev \
            libxkbcommon-dev \
            libdrm-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev \
            libdbus-1-dev \
            libibus-1.0-dev \
            libudev-dev \
            libthai-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libdecor-0-dev \
            liburing-dev
        shell: bash

      - name: Configure
        run: >-
          cmake -S . -B "${{ env.BUILD_DIR }}"
          -G Ninja
          ${{ runner.os == 'Linux' && '-D CMAKE_C_COMPILER=clang -D CMAKE_CXX_COMPILER=clang++' || '' }}
          ${{ runner.os == 'macOS' && '-D CMAKE_C_COMPILER=clang -D CMAKE_CXX_COMPILER=clang++' || '' }}
          ${{ runner.os == 'Windows' && '-D CMAKE_C_COMPILER=clang-cl -D CMAKE_CXX_COMPILER=clang-cl' || '' }}
          -D CMAKE_BUILD_TYPE="${{ matrix.build_type }}"
          -D BASED_BUILD_TESTS=ON
          -D BASED_ENABLE_MODULE_GRAPHICS=ON

      - name: Build
        run: cmake --build "${{ env.BUILD_DIR }}" --parallel

      - name: Run tests
        run: ctest --test-dir "${{ env.BUILD_DIR }}" --build-config "${{ matrix.build_type }}" --output-on-failure
