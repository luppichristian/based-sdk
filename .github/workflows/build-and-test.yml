name: Build And Test

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.arch }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os_arch:
          - ubuntu-x86_64
          - ubuntu-arm64
          - macos-x86_64
          - macos-arm64
          - windows-x86_64
        build_type:
          - Debug
          - Release
          - RelWithDebInfo
          - MinSizeRel
        include:
          - os_arch: ubuntu-x86_64
            os: ubuntu-latest
            arch: x86_64
          - os_arch: ubuntu-arm64
            os: ubuntu-24.04-arm
            arch: arm64
          - os_arch: macos-x86_64
            os: macos-15-intel
            arch: x86_64
          - os_arch: macos-arm64
            os: macos-latest
            arch: arm64
          - os_arch: windows-x86_64
            os: windows-latest
            arch: x86_64

    env:
      BUILD_DIR: build/ci
      CTEST_OUTPUT_ON_FAILURE: 1
      TEST_EXEC_TIMEOUT_SEC: 1800

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch == 'arm64' && 'amd64_arm64' || 'amd64' }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            ninja-build \
            pkg-config \
            libasound2-dev \
            libpulse-dev \
            libaudio-dev \
            libfribidi-dev \
            libjack-dev \
            libsndio-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libxtst-dev \
            libxkbcommon-dev \
            libdrm-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev \
            libdbus-1-dev \
            libibus-1.0-dev \
            libudev-dev \
            libthai-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libdecor-0-dev \
            liburing-dev
        shell: bash

      - name: Validate macOS toolchain
        if: runner.os == 'macOS'
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun --find clang
          xcrun --find clang++
          /usr/bin/clang --version
          /usr/bin/clang++ --version
          xcode_version="$(xcodebuild -version | awk '/Xcode/{print $2; exit}')"
          sdk_version="$(xcrun --sdk macosx --show-sdk-version)"
          python3 - "$xcode_version" "$sdk_version" <<'PY'
          import sys

          def parse_version(raw):
              parts = []
              for token in raw.split('.'):
                  digits = ''.join(ch for ch in token if ch.isdigit())
                  parts.append(int(digits) if digits else 0)
              return tuple(parts)

          xcode_version = sys.argv[1]
          sdk_version = sys.argv[2]
          if parse_version(xcode_version) < parse_version("12.2"):
              raise SystemExit(f"Xcode {xcode_version} is too old, requires >= 12.2")
          if parse_version(sdk_version) < parse_version("11.0"):
              raise SystemExit(f"macOS SDK {sdk_version} is too old, requires >= 11.0")
          print(f"Using Xcode {xcode_version} with macOS SDK {sdk_version}")
          PY

      - name: Resolve macOS SDK path
        if: runner.os == 'macOS'
        id: macos-sdk
        run: |
          sdk_path="$(xcrun --sdk macosx --show-sdk-path)"
          printf 'sdk_path=%s\n' "$sdk_path" >> "$GITHUB_OUTPUT"

      - name: Configure
        run: >-
          cmake -S . -B "${{ env.BUILD_DIR }}"
          -G Ninja
          ${{ runner.os == 'Linux' && '-D CMAKE_C_COMPILER=clang -D CMAKE_CXX_COMPILER=clang++' || '' }}
          ${{ runner.os == 'macOS' && format('-D CMAKE_C_COMPILER=/usr/bin/clang -D CMAKE_CXX_COMPILER=/usr/bin/clang++ -D CMAKE_OBJC_COMPILER=/usr/bin/clang -D CMAKE_OBJCXX_COMPILER=/usr/bin/clang++ -D CMAKE_OSX_SYSROOT={0} -D CMAKE_OSX_ARCHITECTURES={1}', steps.macos-sdk.outputs.sdk_path, matrix.arch) || '' }}
          ${{ runner.os == 'macOS' && '-D CMAKE_OSX_DEPLOYMENT_TARGET=11.0' || '' }}
          ${{ runner.os == 'Windows' && '-D CMAKE_C_COMPILER=clang-cl -D CMAKE_CXX_COMPILER=clang-cl' || '' }}
          -D CMAKE_BUILD_TYPE="${{ matrix.build_type }}"
          -D BASED_BUILD_TESTS=ON
          -D BASED_ENABLE_MODULE_GRAPHICS=ON

      - name: Build
        run: cmake --build "${{ env.BUILD_DIR }}" --parallel

      - name: Run test executables
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: >-
          python .github/scripts/run_test_executables.py
          --build-dir "${{ env.BUILD_DIR }}"
          --build-config "${{ matrix.build_type }}"
          --timeout-sec "${{ env.TEST_EXEC_TIMEOUT_SEC }}"

  build-and-test-windows-arm64-native:
    name: windows-arm64-native / ${{ matrix.build_type }}
    runs-on: [self-hosted, Windows, ARM64]
    strategy:
      fail-fast: false
      matrix:
        build_type:
          - Debug
          - Release
          - RelWithDebInfo
          - MinSizeRel

    env:
      BUILD_DIR: build/ci
      CTEST_OUTPUT_ON_FAILURE: 1
      TEST_EXEC_TIMEOUT_SEC: 1800

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Configure
        run: >-
          cmake -S . -B "${{ env.BUILD_DIR }}"
          -G Ninja
          -D CMAKE_C_COMPILER=clang-cl
          -D CMAKE_CXX_COMPILER=clang-cl
          -D CMAKE_C_COMPILER_TARGET=arm64-pc-windows-msvc
          -D CMAKE_CXX_COMPILER_TARGET=arm64-pc-windows-msvc
          -D CMAKE_BUILD_TYPE="${{ matrix.build_type }}"
          -D BASED_BUILD_TESTS=ON
          -D BASED_ENABLE_MODULE_GRAPHICS=ON

      - name: Build
        run: cmake --build "${{ env.BUILD_DIR }}" --parallel

      - name: Run test executables
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: >-
          python .github/scripts/run_test_executables.py
          --build-dir "${{ env.BUILD_DIR }}"
          --build-config "${{ matrix.build_type }}"
          --timeout-sec "${{ env.TEST_EXEC_TIMEOUT_SEC }}"
